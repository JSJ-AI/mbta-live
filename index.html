<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MBTA Live — Boston Transit</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0a0e1a;--sur:#111827;--sur2:#1a2235;--brd:#1e2d47;--txt:#e8edf5;--mut:#6b7a99;--acc:#4f9cff;--ok:#22c55e;--warn:#f59e0b;--bad:#ef4444;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.hdr{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--sur);border-bottom:1px solid var(--brd);flex-shrink:0;flex-wrap:wrap;}
.logo{font-weight:700;font-size:17px;color:var(--txt);white-space:nowrap;}.logo span{color:var(--acc);}
.live-badge{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:700;color:var(--ok);background:rgba(34,197,94,.1);padding:3px 7px;border-radius:4px;border:1px solid rgba(34,197,94,.3);}
.dot{width:5px;height:5px;background:var(--ok);border-radius:50%;animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.clk{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--mut);}
.btn{padding:4px 9px;border:1px solid var(--brd);background:var(--sur2);color:var(--mut);border-radius:5px;cursor:pointer;font-size:10px;font-weight:600;letter-spacing:.04em;transition:all .15s;white-space:nowrap;}
.btn.on{background:rgba(79,156,255,.15);border-color:var(--acc);color:var(--acc);}
.btn:hover{color:var(--txt);border-color:var(--mut);}
.main{display:flex;flex:1;min-height:0;position:relative;}
#mwrap{flex:1;min-width:0;position:relative;}
#map{width:100%;height:100%;}
.hpop{position:absolute;z-index:200;background:var(--sur);border:1px solid var(--brd);border-radius:8px;padding:10px 12px;pointer-events:none;min-width:190px;max-width:250px;box-shadow:0 4px 24px rgba(0,0,0,.6);display:none;}
.hpop-name{font-weight:700;font-size:13px;margin-bottom:3px;color:var(--txt);}
.hpop-sub{font-size:10px;color:var(--acc);margin-bottom:6px;}
.hpop-row{display:flex;align-items:center;gap:4px;padding:4px 0;border-bottom:1px solid var(--brd);font-size:11px;}
.hpop-row:last-child{border-bottom:none;}
.hpop-rid{font-weight:700;font-size:10px;min-width:52px;}
.hpop-dir{color:var(--mut);flex:1;font-size:10px;}
.hpop-time{font-weight:700;font-family:'JetBrains Mono',monospace;min-width:28px;text-align:right;color:var(--txt);}
.hpop-occ{font-size:9px;padding:1px 4px;border-radius:3px;margin-left:3px;white-space:nowrap;}
.occ-many{background:rgba(34,197,94,.2);color:var(--ok);}
.occ-few{background:rgba(245,158,11,.2);color:var(--warn);}
.occ-full{background:rgba(239,68,68,.2);color:var(--bad);}
.hpop-load{color:var(--mut);font-size:11px;font-style:italic;}
.panel{width:290px;flex-shrink:0;background:var(--sur);border-left:1px solid var(--brd);display:flex;flex-direction:column;overflow:hidden;}
.ptabs{display:flex;border-bottom:1px solid var(--brd);flex-shrink:0;}
.ptab{flex:1;padding:8px 4px;text-align:center;font-size:10px;font-weight:700;color:var(--mut);cursor:pointer;border-bottom:2px solid transparent;letter-spacing:.04em;}
.ptab.on{color:var(--acc);border-bottom-color:var(--acc);}
.pbody{flex:1;overflow-y:auto;padding:10px;}
.psec{display:none;}.psec.on{display:block;}
.lrow{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:6px;margin-bottom:5px;background:var(--sur2);cursor:pointer;transition:background .15s;}
.lrow:hover{background:var(--brd);}
.lpill{width:36px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:#fff;flex-shrink:0;}
.lname{flex:1;font-size:11px;font-weight:500;}
.lstat{font-size:9px;font-weight:700;padding:2px 5px;border-radius:3px;}
.s-ok{background:rgba(34,197,94,.15);color:var(--ok);}
.s-warn{background:rgba(245,158,11,.15);color:var(--warn);}
.s-bad{background:rgba(239,68,68,.15);color:var(--bad);}
.abadge{background:var(--bad);color:#fff;border-radius:8px;font-size:8px;font-weight:800;padding:1px 4px;}
.aitem{padding:9px;border-radius:6px;margin-bottom:7px;background:var(--sur2);border-left:3px solid var(--warn);}
.aitem.hi{border-left-color:var(--bad);}.aitem.lo{border-left-color:var(--brd);}
.aroute{font-size:9px;font-weight:800;color:var(--mut);margin-bottom:3px;letter-spacing:.04em;}
.ahead{font-size:11px;line-height:1.4;color:var(--txt);}
.aeff{font-size:9px;font-weight:700;color:var(--warn);margin-top:3px;text-transform:uppercase;letter-spacing:.04em;}
.vitem{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:6px;margin-bottom:4px;background:var(--sur2);cursor:pointer;}
.vitem:hover{background:var(--brd);}
.vico{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;flex-shrink:0;}
.vlbl{font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;}
.vst{font-size:9px;color:var(--mut);margin-top:1px;}
.ftr{padding:4px 12px;background:var(--sur);border-top:1px solid var(--brd);display:flex;gap:14px;font-size:9px;color:var(--mut);flex-shrink:0;font-family:'JetBrains Mono',monospace;flex-wrap:wrap;}
.ftr b{color:var(--txt);}
.maplibregl-popup-content{padding:12px;border-radius:8px;max-width:230px;font-family:'Inter',sans-serif;color:#111827;}
.ppop-tag{display:inline-block;padding:2px 8px;border-radius:8px;font-size:9px;font-weight:800;color:#fff;margin-bottom:7px;}
.ppop-title{font-size:13px;font-weight:700;margin-bottom:8px;color:#111827;}
.ppop-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #e5e7eb;font-size:11px;}
.ppop-row:last-child{border-bottom:none;}
.ppop-lbl{color:#1e3a5f;font-size:10px;font-weight:700;}
.ppop-val{color:#111827;font-weight:600;}
.ppop-time{font-weight:700;font-family:'JetBrains Mono',monospace;color:#1e3a5f;}
.ppop-load{color:#888;font-size:11px;font-style:italic;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--brd);border-radius:2px;}
@media(max-width:640px){
  .panel{display:none;}
  #btn-panel{display:inline-flex;}
  .hdr-right{gap:4px;}
  .btn{padding:3px 6px;font-size:9px;}
  .clk{display:none;}
}
@media(min-width:641px){
  #btn-panel{display:none;}
}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">MBTA <span>Live</span></div>
  <div class="live-badge"><div class="dot"></div>LIVE</div>
  <div class="hdr-right">
    <div class="clk" id="clk">--:--:--</div>
    <button class="btn on" id="btn-subway" onclick="toggleLayer('subway')">🚇 Subway</button>
    <button class="btn on" id="btn-cr" onclick="toggleLayer('cr')">🚂 Commuter Rail</button>
    <button class="btn on" id="btn-sl" onclick="toggleLayer('sl')">🚌 Silver Line</button>
    <button class="btn on" id="btn-veh" onclick="toggleVeh()">🔴 Trains</button>
    <button class="btn on" id="btn-wc" onclick="toggleWC()" title="Accessible stations">♿</button>
    <button class="btn" id="btn-fs" onclick="toggleFS()" title="Full screen">⛶ Full</button>
    <button class="btn on" id="btn-panel" onclick="togglePanel()" title="Show/hide status panel">☰ Panel</button>
  </div>
</div>
<div class="main">
  <div id="mwrap">
    <div id="map"></div>
    <div class="hpop" id="hpop"></div>
  </div>
  <div class="panel">
    <div class="ptabs">
      <div class="ptab on" onclick="sPTab('status')">STATUS</div>
      <div class="ptab" onclick="sPTab('alerts')">ALERTS <span id="abadge" class="abadge" style="display:none"></span></div>
      <div class="ptab" onclick="sPTab('vehicles')">TRAINS</div>
    </div>
    <div class="pbody">
      <div class="psec on" id="sec-status"><div id="line-list" style="color:var(--mut);font-size:11px;padding:16px;text-align:center">Loading…</div></div>
      <div class="psec" id="sec-alerts"><div id="alert-list" style="color:var(--mut);font-size:11px;padding:16px;text-align:center">Loading…</div></div>
      <div class="psec" id="sec-vehicles"><div id="veh-list" style="color:var(--mut);font-size:11px;padding:16px;text-align:center">Loading…</div></div>
    </div>
  </div>
</div>
<div class="ftr">
  <span>🚇 <b id="ftveh">—</b> trains</span>
  <span>⚠ <b id="ftalert">—</b> alerts</span>
  <span>Vehicles: <b id="ftvt">—</b></span>
  <span>Alerts: <b id="ftat">—</b></span>
  <span style="margin-left:auto">MBTA API v3 · MapLibre GL · OpenFreeMap</span>
</div>
<script>
const API='https://api-v3.mbta.com';
const SUBWAY=['Red','Mattapan','Orange','Green-B','Green-C','Green-D','Green-E','Blue'];
const CR=['CR-Fairmount','CR-Fitchburg','CR-Greenbush','CR-Haverhill','CR-Kingston','CR-Lowell','CR-Needham','CR-Newburyport','CR-Providence','CR-Worcester','CR-NewBedford','CR-Franklin'];
const SL=['741','742','743','746','749','751'];
const ALL=[...SUBWAY,...CR,...SL];
const META={
  Red:{c:'#DA291C',l:'RL',n:'Red Line',t:'subway'},Mattapan:{c:'#DA291C',l:'MT',n:'Mattapan',t:'subway'},
  Orange:{c:'#ED8B00',l:'OL',n:'Orange Line',t:'subway'},Blue:{c:'#003DA5',l:'BL',n:'Blue Line',t:'subway'},
  'Green-B':{c:'#00843D',l:'GL-B',n:'Green B',t:'subway'},'Green-C':{c:'#00843D',l:'GL-C',n:'Green C',t:'subway'},
  'Green-D':{c:'#00843D',l:'GL-D',n:'Green D',t:'subway'},'Green-E':{c:'#00843D',l:'GL-E',n:'Green E',t:'subway'},
};
CR.forEach(r=>META[r]={c:'#80276C',l:'CR',n:r.replace('CR-',''),t:'cr'});
SL.forEach(r=>META[r]={c:'#7C878E',l:'SL',n:'Silver Line',t:'sl'});

let mbl,vmarkers={},vbearing={},stalerts={},vehOn=true,wcOn=true,lon={subway:true,cr:true,sl:true};
let DIRS={}; // routeId -> ['Dest A','Dest B']
async function loadDirs(){
  try{
    const ids=[...Object.keys(META)].join(',');
    const d=await fetch(API+'/routes?filter[id]='+ids+'&fields[route]=direction_destinations').then(r=>r.json());
    (d.data||[]).forEach(r=>{DIRS[r.id]=r.attributes.direction_destinations||[];});
  }catch(e){console.warn('dirs',e);}
}
function dirLabel(rid,dirId){
  const dests=DIRS[rid];
  if(dests&&dests[dirId])return 'to '+dests[dirId];
  return dirId===0?'Outbound':'Inbound';
}
let allAlerts=[],allVeh=[];

setInterval(()=>document.getElementById('clk').textContent=new Date().toLocaleTimeString('en-US',{hour12:false}),1000);

function sPTab(t){
  document.querySelectorAll('.ptab').forEach((el,i)=>el.classList.toggle('on',['status','alerts','vehicles'][i]===t));
  document.querySelectorAll('.psec').forEach(s=>s.classList.remove('on'));
  document.getElementById('sec-'+t).classList.add('on');
}
function toggleLayer(l){
  lon[l]=!lon[l];
  document.getElementById('btn-'+l).classList.toggle('on',lon[l]);
  if(!mbl)return;
  const v=lon[l]?'visible':'none';
  mbl.getStyle().layers.forEach(ly=>{if(ly.id.startsWith(l+'-'))mbl.setLayoutProperty(ly.id,'visibility',v);});
  if(l==='subway'){
    ['stops-wc','stops-ring','stops-dot','stops-lbl'].forEach(id=>{
      if(mbl.getLayer(id))mbl.setLayoutProperty(id,'visibility',v);
    });
  }
}
function toggleVeh(){
  vehOn=!vehOn;
  document.getElementById('btn-veh').classList.toggle('on',vehOn);
  Object.values(vmarkers).forEach(mk=>mk.getElement().style.display=vehOn?'block':'none');
}
function toggleWC(){
  wcOn=!wcOn;
  document.getElementById('btn-wc').classList.toggle('on',wcOn);
  if(mbl&&mbl.getLayer('stops-wc'))mbl.setLayoutProperty('stops-wc','visibility',wcOn?'visible':'none');
}
function togglePanel(){
  const panel=document.querySelector('.panel');
  const btn=document.getElementById('btn-panel');
  const hidden=panel.style.display==='none';
  panel.style.display=hidden?'':'none';
  btn.classList.toggle('on',hidden);
  if(mbl)mbl.resize();
}
function toggleFS(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen();
    document.getElementById('btn-fs').textContent='✕ Exit';
    document.getElementById('btn-fs').classList.add('on');
  } else {
    document.exitFullscreen();
    document.getElementById('btn-fs').textContent='⛶ Full';
    document.getElementById('btn-fs').classList.remove('on');
  }
}
function decPoly(enc){
  const c=[];let i=0,la=0,lo=0;
  while(i<enc.length){
    let b,sh=0,res=0;
    do{b=enc.charCodeAt(i++)-63;res|=(b&0x1f)<<sh;sh+=5;}while(b>=0x20);
    la+=(res&1)?~(res>>1):(res>>1);sh=0;res=0;
    do{b=enc.charCodeAt(i++)-63;res|=(b&0x1f)<<sh;sh+=5;}while(b>=0x20);
    lo+=(res&1)?~(res>>1):(res>>1);c.push([lo/1e5,la/1e5]);
  }return c;
}

// ── MAP ──────────────────────────────────────────────────────────────────────
mbl=new maplibregl.Map({container:'map',style:'https://tiles.openfreemap.org/styles/liberty',center:[-71.08,42.36],zoom:12,attributionControl:false});
mbl.addControl(new maplibregl.NavigationControl(),'top-right');
mbl.addControl(new maplibregl.AttributionControl({compact:true}),'bottom-right');

mbl.on('load',async()=>{
  mbl.setGlyphs('https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf');
  await loadDirs();
  // CRITICAL: load stations FIRST so event listeners register before shape fetches
  await loadStations();
  // Then load shapes in parallel (errors caught individually)
  Promise.allSettled(ALL.map(rid=>loadShape(rid)));
  // Load data
  await Promise.all([doAlerts(),doVeh()]);
  setInterval(doVeh,15000);
  setInterval(doAlerts,30000);
});

// ── SHAPES ───────────────────────────────────────────────────────────────────
async function loadShape(rid){
  const m=META[rid];if(!m)return;
  try{
    const d=await fetch(API+'/shapes?filter[route]='+rid+'&fields[shape]=polyline').then(r=>r.json());
    if(!d.data||!d.data.length)return;
    const feats=d.data.map(s=>({type:'Feature',geometry:{type:'LineString',coordinates:decPoly(s.attributes.polyline)},properties:{}}));
    const sid='sh-'+rid;
    mbl.addSource(sid,{type:'geojson',data:{type:'FeatureCollection',features:feats}});
    mbl.addLayer({id:m.t+'-'+rid+'-c',type:'line',source:sid,
      layout:{'line-join':'round','line-cap':'round',visibility:lon[m.t]?'visible':'none'},
      paint:{'line-color':'#ffffff','line-width':['interpolate',['linear'],['zoom'],8,2,12,5,16,9],'line-opacity':0.45}});
    mbl.addLayer({id:m.t+'-'+rid+'-f',type:'line',source:sid,
      layout:{'line-join':'round','line-cap':'round',visibility:lon[m.t]?'visible':'none'},
      paint:{'line-color':m.c,'line-width':['interpolate',['linear'],['zoom'],8,1.5,12,3.5,16,7],'line-opacity':0.95}});
  }catch(e){console.warn('shape',rid,e.message);}
}

// ── STATIONS ─────────────────────────────────────────────────────────────────
async function loadStations(){
  try{
    const d=await fetch(API+'/stops?filter[route]='+SUBWAY.join(',')+'&fields[stop]=name,latitude,longitude,municipality,wheelchair_boarding').then(r=>r.json());
    if(!d||!d.data)throw new Error('No data from stops API');
    const seen=new Set(),feats=[];
    d.data.forEach(s=>{
      if(seen.has(s.id)||!s.attributes.latitude)return;
      seen.add(s.id);const a=s.attributes;
      feats.push({type:'Feature',geometry:{type:'Point',coordinates:[a.longitude,a.latitude]},
        properties:{id:s.id,name:a.name,wc:a.wheelchair_boarding,muni:a.municipality||''}});
    });
    mbl.addSource('stops',{type:'geojson',data:{type:'FeatureCollection',features:feats},promoteId:'id'});
    mbl.addLayer({id:'stops-wc',type:'circle',source:'stops',filter:['==',['get','wc'],1],
      layout:{visibility:wcOn?'visible':'none'},
      paint:{'circle-radius':['interpolate',['linear'],['zoom'],10,7,13,13,16,20],
        'circle-color':'rgba(0,0,0,0)','circle-stroke-width':2.5,
        'circle-stroke-color':'#60a5fa','circle-stroke-opacity':0.75,'circle-opacity':0}});
    mbl.addLayer({id:'stops-ring',type:'circle',source:'stops',paint:{
      'circle-radius':['interpolate',['linear'],['zoom'],10,4,13,8,16,13],
      'circle-color':'#fff','circle-stroke-width':1.5,'circle-stroke-color':'#333','circle-opacity':1}});
    mbl.addLayer({id:'stops-dot',type:'circle',source:'stops',paint:{
      'circle-radius':['interpolate',['linear'],['zoom'],10,2.5,13,5,16,8],
      'circle-color':['case',['boolean',['feature-state','alert'],false],'#ef4444',
        ['boolean',['feature-state','warn'],false],'#f59e0b','#22c55e'],'circle-opacity':0.95}});
    mbl.addLayer({id:'stops-lbl',type:'symbol',source:'stops',minzoom:12,
      layout:{'text-field':['get','name'],'text-font':['Noto Sans Bold'],
        'text-size':['interpolate',['linear'],['zoom'],12,11,14,13,16,15],
        'text-anchor':'top','text-offset':[0,1.0],'text-allow-overlap':false,'text-max-width':8},
      paint:{'text-color':'#ffffff','text-halo-color':'rgba(5,8,16,0.98)','text-halo-width':2.2,'text-halo-blur':0}});

    // HOVER — next trains + occupancy
    mbl.on('mouseenter','stops-ring',async e=>{
      mbl.getCanvas().style.cursor='pointer';
      const f=e.features[0];if(!f)return;
      const p=f.properties;
      const hp=document.getElementById('hpop');
      hp.style.display='block';
      hp.innerHTML='<div class="hpop-name">'+p.name+'</div>'+(p.wc==1?'<div class="hpop-sub">♿ Accessible</div>':'')+'<div class="hpop-load">Loading arrivals…</div>';
      moveHpop(e);
      try{
        const pd=await fetch(API+'/predictions?filter[stop]='+f.id+'&fields[prediction]=arrival_time,departure_time,direction_id,status&include=vehicle,route&page[limit]=8&sort=arrival_time').then(r=>r.json());
        if(hp.style.display==='none')return;
        const rm={},vm={};
        (pd.included||[]).forEach(x=>{if(x.type==='route')rm[x.id]=x;if(x.type==='vehicle')vm[x.id]=x;});
        if(!pd.data||!pd.data.length){hp.innerHTML='<div class="hpop-name">'+p.name+'</div><div class="hpop-load">No upcoming arrivals</div>';return;}
        const rows=pd.data.slice(0,5).map(pr=>{
          const a=pr.attributes,t=a.arrival_time||a.departure_time;
          const rid=pr.relationships?.route?.data?.id||'';
          const vid=pr.relationships?.vehicle?.data?.id;
          const vd=vid?vm[vid]:null;
          const mc=META[rid]?.c||'#888';
          const ts=t?(()=>{const df=Math.round((new Date(t)-Date.now())/60000);return df<=0?'Now':df+'m';})():(a.status||'—');
          const dir=DIRS[rid]?'to '+(DIRS[rid][a.direction_id]||'?'):(a.direction_id===0?'Out':'In');
          let occHtml='';
          if(vd){const occ=vd.attributes.occupancy_status;
            const om={'MANY_SEATS_AVAILABLE':['occ-many','Plenty'],'FEW_SEATS_AVAILABLE':['occ-few','Few seats'],'STANDING_ROOM_ONLY':['occ-full','Standing'],'CRUSHED_STANDING_ROOM_ONLY':['occ-full','Packed'],'FULL':['occ-full','Full']};
            if(occ&&om[occ]){const[cls,lbl]=om[occ];occHtml='<span class="hpop-occ '+cls+'">'+lbl+'</span>';}}
          return '<div class="hpop-row"><span class="hpop-rid" style="color:'+mc+'">'+rid+'</span><span class="hpop-dir">'+dir+'</span><span class="hpop-time">'+ts+'</span>'+occHtml+'</div>';
        }).join('');
        hp.innerHTML='<div class="hpop-name">'+p.name+'</div>'+(p.wc==1?'<div class="hpop-sub">♿ Accessible</div>':'')+rows;
      }catch(err){if(hp.style.display!=='none')hp.innerHTML='<div class="hpop-name">'+p.name+'</div><div class="hpop-load">Could not load</div>';}
    });
    mbl.on('mousemove','stops-ring',moveHpop);
    mbl.on('mouseleave','stops-ring',()=>{mbl.getCanvas().style.cursor='';document.getElementById('hpop').style.display='none';});

    // CLICK — full predictions popup
    mbl.on('click','stops-ring',async e=>{
      const f=e.features[0];if(!f)return;
      const p=f.properties;
      const sa=allAlerts.filter(a=>(a.attributes.informed_entity||[]).some(ie=>ie.stop===f.id));
      const ah=sa.length?'<div style="background:#fff3cd;border:1px solid #ffc107;border-radius:4px;padding:5px 7px;font-size:10px;color:#856404;margin-bottom:6px">⚠ '+sa[0].attributes.header.substring(0,80)+'</div>':'';
      const pop=new maplibregl.Popup({maxWidth:'260px'}).setLngLat(e.lngLat).setHTML(
        '<div><div class="ppop-title">'+p.name+'</div>'+(p.wc==1?'<div style="font-size:10px;color:#1e3a5f;font-weight:600;margin-bottom:5px">♿ Accessible · '+p.muni+'</div>':'')+ah+'<div id="pr-'+f.id+'" class="ppop-load">Fetching arrivals…</div></div>'
      ).addTo(mbl);
      try{
        const pd=await fetch(API+'/predictions?filter[stop]='+f.id+'&fields[prediction]=arrival_time,departure_time,direction_id,status&include=route&page[limit]=8&sort=arrival_time').then(r=>r.json());
        const el=document.getElementById('pr-'+f.id);if(!el)return;
        if(!pd.data||!pd.data.length){el.textContent='No upcoming arrivals';return;}
        el.innerHTML=pd.data.slice(0,6).map(pr=>{
          const a=pr.attributes,t=a.arrival_time||a.departure_time;
          const rid=pr.relationships?.route?.data?.id||'';
          const mc=META[rid]?.c||'#888';
          const ts=t?(()=>{const df=Math.round((new Date(t)-Date.now())/60000);return df<=0?'Now':df+'m';})():(a.status||'—');
          return '<div class="ppop-row"><span class="ppop-lbl" style="color:'+mc+'">'+rid+'</span><span class="ppop-lbl">'+(a.direction_id===0?'→ Out':'← In')+'</span><span class="ppop-time">'+ts+'</span></div>';
        }).join('');
      }catch(err){const el=document.getElementById('pr-'+f.id);if(el)el.textContent='Could not load';}
    });
  }catch(err){console.error('loadStations failed:',err.message);}
}

function moveHpop(e){
  const hp=document.getElementById('hpop');
  const rect=document.getElementById('mwrap').getBoundingClientRect();
  let x=e.originalEvent.clientX-rect.left+14;
  let y=e.originalEvent.clientY-rect.top-10;
  if(x+260>rect.width)x=e.originalEvent.clientX-rect.left-270;
  hp.style.left=x+'px';hp.style.top=y+'px';
}

// ── ALERTS ───────────────────────────────────────────────────────────────────
async function doAlerts(){
  try{
    const d=await fetch(API+'/alerts?filter[route_type]=0,1,2,3&fields[alert]=id,header,effect,severity,informed_entity').then(r=>r.json());
    allAlerts=d.data||[];
    const cnt=allAlerts.length;
    document.getElementById('ftalert').textContent=cnt;
    document.getElementById('ftat').textContent=new Date().toLocaleTimeString('en-US',{hour12:false});
    const b=document.getElementById('abadge');
    if(cnt){b.textContent=cnt;b.style.display='inline';}else b.style.display='none';
    stalerts={};
    allAlerts.forEach(a=>{(a.attributes.informed_entity||[]).forEach(ie=>{if(ie.stop)stalerts[ie.stop]=Math.max(stalerts[ie.stop]||0,a.attributes.severity||1);});});
    if(mbl.getSource('stops')){
      Object.entries(stalerts).forEach(([sid,sev])=>mbl.setFeatureState({source:'stops',id:sid},{alert:sev>=5,warn:sev>0&&sev<5}));
    }
    renderAlerts();renderStatus();
  }catch(e){console.warn('alerts',e);}
}

function renderAlerts(){
  const el=document.getElementById('alert-list');
  if(!allAlerts.length){el.innerHTML='<div style="color:var(--mut);font-size:11px;padding:16px;text-align:center">No active alerts</div>';return;}
  el.innerHTML=[...allAlerts].sort((a,b)=>(b.attributes.severity||0)-(a.attributes.severity||0)).map(a=>{
    const at=a.attributes,sev=at.severity||0;
    const rts=[...new Set((at.informed_entity||[]).map(ie=>ie.route).filter(Boolean))].slice(0,4).join(' · ');
    return '<div class="aitem'+(sev>=7?' hi':sev<2?' lo':'')+'">'+
      (rts?'<div class="aroute">'+rts+'</div>':'')+
      '<div class="ahead">'+(at.header||'')+'</div>'+
      '<div class="aeff">'+((at.effect||'').replace(/_/g,' '))+'</div></div>';
  }).join('');
}

const LG=[
  {routes:['Red'],l:'RL',n:'Red Line',c:'#DA291C'},
  {routes:['Orange'],l:'OL',n:'Orange Line',c:'#ED8B00'},
  {routes:['Green-B','Green-C','Green-D','Green-E'],l:'GL',n:'Green Line',c:'#00843D'},
  {routes:['Blue'],l:'BL',n:'Blue Line',c:'#003DA5'},
  {routes:['Mattapan'],l:'MT',n:'Mattapan',c:'#DA291C'},
  {routes:SL,l:'SL',n:'Silver Line',c:'#7C878E'},
  {routes:CR,l:'CR',n:'Commuter Rail',c:'#80276C'},
];
function renderStatus(){
  document.getElementById('line-list').innerHTML=LG.map(g=>{
    const cnt=allAlerts.filter(a=>(a.attributes.informed_entity||[]).some(ie=>g.routes.includes(ie.route))).length;
    const sev=allAlerts.filter(a=>(a.attributes.informed_entity||[]).some(ie=>g.routes.includes(ie.route))).reduce((m,a)=>Math.max(m,a.attributes.severity||0),0);
    const cls=cnt===0?'s-ok':sev>=7?'s-bad':'s-warn';
    return '<div class="lrow" onclick="fvByLine('+JSON.stringify(g.routes)+')">'+
      '<div class="lpill" style="background:'+g.c+'">'+g.l+'</div>'+
      '<div class="lname">'+g.n+'</div>'+
      '<div class="lstat '+cls+'">'+(cnt===0?'Normal':sev>=7?'Disruption':'Advisory')+'</div>'+
      (cnt?'<div class="abadge">'+cnt+'</div>':'')+'</div>';
  }).join('');
}

// ── VEHICLES ─────────────────────────────────────────────────────────────────
const OCC_LABEL={MANY_SEATS_AVAILABLE:'Plenty of seats',FEW_SEATS_AVAILABLE:'Few seats left',STANDING_ROOM_ONLY:'Standing room',CRUSHED_STANDING_ROOM_ONLY:'Very crowded',FULL:'Full'};
const OCC_ICON={MANY_SEATS_AVAILABLE:'🟢',FEW_SEATS_AVAILABLE:'🟡',STANDING_ROOM_ONLY:'🔴',CRUSHED_STANDING_ROOM_ONLY:'🔴',FULL:'🔴'};

async function doVeh(){
  try{
    const d=await fetch(API+'/vehicles?filter[route]='+ALL.join(',')+'&fields[vehicle]=label,latitude,longitude,bearing,current_status,speed,occupancy_status,direction_id&include=route').then(r=>r.json());
    allVeh=d.data||[];
    const rm={};(d.included||[]).filter(x=>x.type==='route').forEach(r=>{rm[r.id]=r;});
    document.getElementById('ftveh').textContent=allVeh.length;
    document.getElementById('ftvt').textContent=new Date().toLocaleTimeString('en-US',{hour12:false});
    updVeh(allVeh);renderVeh(allVeh);
  }catch(e){console.warn('veh',e);}
}

function updVeh(veh){
  const seen=new Set();
  veh.forEach(v=>{
    const a=v.attributes;
    if(!a.latitude||!a.longitude)return;
    const rid=v.relationships?.route?.data?.id||'';
    const m=META[rid]||{c:'#888',l:'?',n:rid,t:'subway'};
    seen.add(v.id);
    if(vmarkers[v.id]){
      vmarkers[v.id].setLngLat([a.longitude,a.latitude]);
      if(a.bearing!==null&&a.bearing!==undefined) vbearing[v.id]=a.bearing;
      const effBearing=vbearing[v.id]||0;
      if(typeof vmarkers[v.id].setRotation==='function') vmarkers[v.id].setRotation(effBearing);
      // Dim SVG if bearing is currently null (stopped/unknown direction)
      const svgEl=vmarkers[v.id].getElement().querySelector('polygon,circle');
      if(svgEl) svgEl.setAttribute('opacity', a.bearing===null?'0.45':'1');
      return;
    }
    // Create SVG — arrow if bearing known, circle if null (stopped/unknown)
    const ns='http://www.w3.org/2000/svg';
    const svg=document.createElementNS(ns,'svg');
    if(a.bearing!==null&&a.bearing!==undefined) vbearing[v.id]=a.bearing;
    const effBear = vbearing[v.id]; // last known or current
    const hasBearing = effBear !== undefined && effBear !== null;
    const bearingNull = a.bearing===null||a.bearing===undefined; // currently unknown
    if(hasBearing){
      svg.setAttribute('width','16');svg.setAttribute('height','20');svg.setAttribute('viewBox','0 0 16 20');
      svg.style.cssText='filter:drop-shadow(0 1px 3px rgba(0,0,0,.7));display:block;';
      const poly=document.createElementNS(ns,'polygon');
      poly.setAttribute('points','8,0 16,16 8,11 0,16');
      poly.setAttribute('fill',m.c);poly.setAttribute('stroke','white');
      poly.setAttribute('stroke-width','1.5');poly.setAttribute('stroke-linejoin','round');
      svg.appendChild(poly);
    } else {
      // Circle dot for stopped/no-bearing trains
      svg.setAttribute('width','14');svg.setAttribute('height','14');svg.setAttribute('viewBox','0 0 14 14');
      svg.style.cssText='filter:drop-shadow(0 1px 3px rgba(0,0,0,.7));display:block;';
      const circle=document.createElementNS(ns,'circle');
      circle.setAttribute('cx','7');circle.setAttribute('cy','7');circle.setAttribute('r','5');
      circle.setAttribute('fill',m.c);circle.setAttribute('stroke','white');circle.setAttribute('stroke-width','2');
      svg.appendChild(circle);
    }
    // Dim if bearing currently null (use last known direction but visually indicate uncertainty)
    if(hasBearing){const sh=svg.querySelector('polygon,circle');if(sh)sh.setAttribute('opacity',bearingNull?'0.45':'1');}
    const mk=new maplibregl.Marker({element:svg,rotation:hasBearing?effBear:0,rotationAlignment:'map',pitchAlignment:'map'})
      .setLngLat([a.longitude,a.latitude]).addTo(mbl);
    // Attach click to the wrapper MapLibre creates
    const wrapper=mk.getElement();
    wrapper.style.cursor='pointer';
    if(!vehOn)wrapper.style.display='none';
    // Capture vehicle data at creation time
    const snap={a:{...a},m,vid:v.id};
    wrapper.addEventListener('click',evt=>{
      evt.stopPropagation();
      const status=(snap.a.current_status||'').replace(/_/g,' ')||'—';
      const spd=snap.a.speed?Math.round(snap.a.speed*2.237)+'mph':'—';
      const dir=dirLabel(snap.m?Object.keys(META).find(k=>META[k]===snap.m)||snap.vid:'',snap.a.direction_id);
      const occLbl=OCC_LABEL[snap.a.occupancy_status]||'';
      const occIco=OCC_ICON[snap.a.occupancy_status]||'';
      const occRow=occLbl?'<div class="ppop-row"><span class="ppop-lbl">Occupancy</span><span class="ppop-val">'+occIco+' '+occLbl+'</span></div>':'';
      new maplibregl.Popup({offset:14,maxWidth:'220px',closeButton:true})
        .setLngLat(mk.getLngLat())
        .setHTML('<div>'+
          '<div class="ppop-tag" style="background:'+snap.m.c+'">'+snap.m.n+'</div>'+
          '<div class="ppop-title">Car '+(snap.a.label||snap.vid)+'</div>'+
          occRow+
          '<div class="ppop-row"><span class="ppop-lbl">Status</span><span class="ppop-val">'+status+'</span></div>'+
          '<div class="ppop-row"><span class="ppop-lbl">Speed</span><span class="ppop-time">'+spd+'</span></div>'+
          '<div class="ppop-row"><span class="ppop-lbl">Direction</span><span class="ppop-val">'+dir+'</span></div>'+
          '</div>')
        .addTo(mbl);
    });
    vmarkers[v.id]=mk;
  });
  Object.keys(vmarkers).forEach(id=>{if(!seen.has(id)){vmarkers[id].remove();delete vmarkers[id];}});
}

function renderVeh(veh){
  const el=document.getElementById('veh-list');
  if(!veh.length){el.innerHTML='<div style="color:var(--mut);font-size:11px;padding:16px;text-align:center">No active vehicles</div>';return;}
  el.innerHTML=[...veh].sort((a,b)=>(a.relationships?.route?.data?.id||'').localeCompare(b.relationships?.route?.data?.id||'')).map(v=>{
    const a=v.attributes,rid=v.relationships?.route?.data?.id||'';
    const m=META[rid]||{c:'#888',l:'?',n:rid};
    const st=(a.current_status||'').replace(/_/g,' ').toLowerCase();
    const occ=OCC_ICON[a.occupancy_status]||'';
    return '<div class="vitem" onclick="mbl.flyTo({center:['+a.longitude+','+a.latitude+'],zoom:15,duration:700})">'+
      '<div class="vico" style="background:'+m.c+'22;color:'+m.c+'">'+m.l+'</div>'+
      '<div><div class="vlbl">'+(a.label||v.id)+' '+occ+'</div>'+
      '<div class="vst">'+st+' · '+dirLabel(rid,a.direction_id)+'</div></div></div>';
  }).join('');
}

function fvByLine(routes){
  sPTab('vehicles');
  renderVeh(allVeh.filter(v=>routes.includes(v.relationships?.route?.data?.id)));
}
